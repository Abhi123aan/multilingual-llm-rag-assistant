<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Multilingual RAG Assistant demo screenshot</title>
  <desc id="desc">A static screenshot-style preview of the Streamlit chat interface with an English query, retrieved sources, and response metrics.</desc>
  <rect width="1280" height="760" fill="#f7f9fc"/>
  <rect x="0" y="0" width="1280" height="64" fill="#132238"/>
  <text x="40" y="41" fill="#ffffff" font-family="Arial, sans-serif" font-size="24" font-weight="700">Multilingual LLM RAG Assistant</text>
  <rect x="40" y="96" width="290" height="610" rx="8" fill="#ffffff" stroke="#d8dee9"/>
  <text x="66" y="136" fill="#132238" font-family="Arial, sans-serif" font-size="20" font-weight="700">Configuration</text>
  <text x="66" y="186" fill="#526173" font-family="Arial, sans-serif" font-size="15">Language</text>
  <rect x="66" y="200" width="220" height="38" rx="6" fill="#eef3f8" stroke="#cad4df"/>
  <text x="82" y="225" fill="#132238" font-family="Arial, sans-serif" font-size="15">English</text>
  <text x="66" y="276" fill="#526173" font-family="Arial, sans-serif" font-size="15">Model</text>
  <rect x="66" y="290" width="220" height="38" rx="6" fill="#eef3f8" stroke="#cad4df"/>
  <text x="82" y="315" fill="#132238" font-family="Arial, sans-serif" font-size="15">groq-mixtral</text>
  <text x="66" y="382" fill="#526173" font-family="Arial, sans-serif" font-size="15">Temperature: 0.7</text>
  <line x1="66" y1="408" x2="286" y2="408" stroke="#cad4df" stroke-width="8" stroke-linecap="round"/>
  <line x1="66" y1="408" x2="220" y2="408" stroke="#1f7aec" stroke-width="8" stroke-linecap="round"/>
  <text x="66" y="500" fill="#132238" font-family="Arial, sans-serif" font-size="18" font-weight="700">Status</text>
  <text x="66" y="532" fill="#12805c" font-family="Arial, sans-serif" font-size="15">API connected</text>
  <rect x="370" y="96" width="860" height="160" rx="8" fill="#ffffff" stroke="#d8dee9"/>
  <text x="400" y="136" fill="#132238" font-family="Arial, sans-serif" font-size="20" font-weight="700">Query Interface</text>
  <rect x="400" y="158" width="800" height="70" rx="6" fill="#f7f9fc" stroke="#cad4df"/>
  <text x="424" y="200" fill="#132238" font-family="Arial, sans-serif" font-size="18">What are the benefits of machine learning?</text>
  <rect x="370" y="286" width="860" height="220" rx="8" fill="#ffffff" stroke="#d8dee9"/>
  <text x="400" y="326" fill="#12805c" font-family="Arial, sans-serif" font-size="18" font-weight="700">Response</text>
  <text x="400" y="365" fill="#263442" font-family="Arial, sans-serif" font-size="17">Machine learning helps systems improve from data, automate repetitive decisions,</text>
  <text x="400" y="395" fill="#263442" font-family="Arial, sans-serif" font-size="17">and uncover patterns that are difficult to encode manually.</text>
  <text x="400" y="452" fill="#526173" font-family="Arial, sans-serif" font-size="15">Sources: Machine Learning, Python Basics, FAISS Vector Search</text>
  <rect x="370" y="536" width="265" height="110" rx="8" fill="#ffffff" stroke="#d8dee9"/>
  <text x="400" y="580" fill="#526173" font-family="Arial, sans-serif" font-size="15">Processing Time</text>
  <text x="400" y="618" fill="#132238" font-family="Arial, sans-serif" font-size="28" font-weight="700">0.02s</text>
  <rect x="668" y="536" width="265" height="110" rx="8" fill="#ffffff" stroke="#d8dee9"/>
  <text x="698" y="580" fill="#526173" font-family="Arial, sans-serif" font-size="15">Tokens Used</text>
  <text x="698" y="618" fill="#132238" font-family="Arial, sans-serif" font-size="28" font-weight="700">91</text>
  <rect x="966" y="536" width="264" height="110" rx="8" fill="#ffffff" stroke="#d8dee9"/>
  <text x="996" y="580" fill="#526173" font-family="Arial, sans-serif" font-size="15">Detected Language</text>
  <text x="996" y="618" fill="#132238" font-family="Arial, sans-serif" font-size="28" font-weight="700">English</text>
</svg>
